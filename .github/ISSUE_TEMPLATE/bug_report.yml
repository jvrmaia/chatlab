name: Bug report
description: Something is broken or behaves unexpectedly.
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in the sections below — we will be much faster at fixing it.

        > **Heads up:** the project is in pre-alpha. If you hit a bug *in a spec or in the docs*, that's the most useful kind of report right now.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Plain prose. What did you do, and what did you see that you didn't expect?
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal reproduction. Code, commands, or a link to a repo.
      placeholder: |
        1. Run `npx @jvrmaia/chatlab`
        2. Open `http://localhost:4480/ui`
        3. ...
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Output of `chatlab --version`, or the commit SHA you tested against.
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, Node version, and how you're running it (npm / docker / source).
      placeholder: macOS 14 / Node 22.4.0 / npx
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste anything from chatlab's console output that looks related. Wrap in triple-backtick code fences.
      render: shell
