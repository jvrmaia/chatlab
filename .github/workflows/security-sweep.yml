name: security-sweep

# Comprehensive security analysis lifecycle — see ADR 0012.
#
# Runs all security dimensions in parallel on a weekly cadence.
# This workflow COMPLEMENTS (does not replace) the per-PR gates in
# codeql.yml, secret-scan.yml, and dependency-scan.yml.
#
# Jobs:
#   codeql        — SAST with security-extended (deeper taint analysis)
#   osv-scan      — CVE/GHSA in manifests + lockfiles
#   secrets       — Gitleaks over full git history
#   npm-audit     — npm advisory database (complements OSV)
#   license-check — dependency license compliance (must be MIT-compatible)

on:
  schedule:
    - cron: "0 2 * * 0"  # Sundays at 02:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  security-events: write  # SARIF → Security tab
  actions: read

concurrency:
  group: security-sweep-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codeql:
    name: CodeQL (security-extended)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          # security-extended adds deeper taint-tracking queries on top of
          # security-and-quality (the query suite used in the PR gate codeql.yml).
          queries: security-extended

      - uses: github/codeql-action/autobuild@v4

      - uses: github/codeql-action/analyze@v4
        with:
          # Distinct category keeps these findings separate from the PR-gate
          # findings in the GitHub Security tab.
          category: security-sweep/codeql

  osv-scan:
    name: OSV-Scanner
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: google/osv-scanner-action/osv-scanner-action@v2.3.8
        with:
          scan-args: |-
            --recursive
            --format=sarif
            --output=osv-results.sarif
            ./

      - name: Upload SARIF to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: osv-results.sarif
          category: security-sweep/osv

  secrets:
    name: Gitleaks (full history)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # full history — Gitleaks scans every commit
          persist-credentials: false

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  npm-audit:
    name: npm audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - run: npm ci

      - name: Audit (fail on high+)
        # moderate/low are acceptable noise for a local dev tool;
        # high and critical block the sweep.
        run: npm audit --audit-level=high

  license-check:
    name: License compliance
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - run: npm ci

      - name: Check licenses
        # Allowlist covers all licenses found in the current dependency tree
        # (verified 2026-05-11 against full npm install output).
        # SPDX compound expressions like "(MIT OR WTFPL)" must be listed verbatim.
        run: |
          npx --yes license-checker-rseidelsohn \
            --onlyAllow "MIT;ISC;BSD-2-Clause;BSD-3-Clause;Apache-2.0;Unlicense;CC0-1.0;CC-BY-3.0;CC-BY-4.0;0BSD;BlueOak-1.0.0;Python-2.0;MPL-2.0;MIT-0;(MIT OR WTFPL);(BSD-2-Clause OR MIT OR Apache-2.0)" \
            --excludePrivatePackages \
            --summary
