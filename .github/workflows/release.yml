name: release

# Release workflow per ADR 0003 (npm + Docker Hub + GitHub Release).
#
# Two trigger paths:
#   - workflow_dispatch — manual run, supports dry_run.
#   - push to tag v*.*.* — auto-fires for tagged releases.
#
# Required repo secrets (set in Settings → Secrets → Actions):
#   NPM_TOKEN          — npmjs.com automation token with publish scope
#   DOCKERHUB_USERNAME — Docker Hub user (the image is published as
#                        "${DOCKERHUB_USERNAME}/chatlab"; defaults to
#                        "jvrmaia/chatlab" in the docs).
#   DOCKERHUB_TOKEN    — Docker Hub access token

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Semver version without leading 'v' (e.g. 1.0.0-rc.1). Must match package.json."
        required: true
        type: string
      dry_run:
        description: "If true, build + test only — skip publish."
        required: true
        type: boolean
        default: true
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write       # GitHub Release creation
  packages: write       # GHCR if we add it later
  id-token: write       # npm provenance

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  verify:
    name: Verify package + tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      version: ${{ steps.derive-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          registry-url: "https://registry.npmjs.org"

      - name: Derive version
        id: derive-version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VER="${{ github.event.inputs.version }}"
          else
            VER="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "Version: $VER"

      - name: Verify package.json matches version
        run: |
          PKG=$(node -p "require('./package.json').version")
          if [ "$PKG" != "${{ steps.derive-version.outputs.version }}" ]; then
            echo "::error::package.json says $PKG but tag/input says ${{ steps.derive-version.outputs.version }}"
            exit 1
          fi

      - name: Install
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Lint OpenAPI
        run: |
          npx -y @redocly/cli@2.30.3 lint docs/specs/api/openapi.yaml \
            --skip-rule no-server-example.com

  publish-npm:
    name: Publish to npm
    needs: verify
    if: ${{ github.event_name == 'push' || github.event.inputs.dry_run == 'false' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: release
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          registry-url: "https://registry.npmjs.org"

      - run: npm ci
      - run: npm run build

      - name: Pick dist-tag
        id: dist-tag
        run: |
          VER="${{ needs.verify.outputs.version }}"
          if [[ "$VER" == *-* ]]; then
            echo "tag=next" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish
        run: npm publish --provenance --access public --tag "${{ steps.dist-tag.outputs.tag }}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-docker:
    name: Publish multi-arch Docker image
    needs: verify
    if: ${{ github.event_name == 'push' || github.event.inputs.dry_run == 'false' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: release
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (for cross-arch builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute tags
        id: tags
        run: |
          VER="${{ needs.verify.outputs.version }}"
          REPO="${{ secrets.DOCKERHUB_USERNAME }}/chatlab"
          TAGS="${REPO}:${VER}"
          if [[ "$VER" != *-* ]]; then
            # stable release — also tag major + major.minor + latest
            MAJOR="${VER%%.*}"
            REST="${VER#*.}"
            MINOR="${REST%%.*}"
            TAGS="$TAGS,${REPO}:${MAJOR}.${MINOR},${REPO}:${MAJOR},${REPO}:latest"
          else
            TAGS="$TAGS,${REPO}:next"
          fi
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"

      - name: Build + push (linux/amd64, linux/arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ needs.verify.outputs.version }}
            org.opencontainers.image.licenses=MIT
          cache-from: type=gha
          cache-to: type=gha,mode=max

  github-release:
    name: Create GitHub Release
    needs: [verify, publish-npm, publish-docker]
    if: ${{ github.event_name == 'push' || github.event.inputs.dry_run == 'false' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VER="${{ needs.verify.outputs.version }}"
          TAG="v$VER"
          # Extract this version's section from CHANGELOG.md (between H2 headings)
          NOTES_FILE=$(mktemp)
          awk -v ver="$VER" '
            $0 ~ "^## \\[" ver "\\]" { capture=1; next }
            capture && /^## \[/ { exit }
            capture { print }
          ' CHANGELOG.md > "$NOTES_FILE"
          if [ ! -s "$NOTES_FILE" ]; then
            echo "Release $VER" > "$NOTES_FILE"
          fi
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --notes-file "$NOTES_FILE"
          else
            gh release create "$TAG" --title "$TAG" --notes-file "$NOTES_FILE"
          fi
