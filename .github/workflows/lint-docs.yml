name: lint-docs

on:
  pull_request:
    paths:
      - "docs/**"
      - "docs-site/**"
      - "*.md"
      - ".github/workflows/lint-docs.yml"
      - ".github/workflows/docs-deploy.yml"
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "docs-site/**"
      - "*.md"
      - ".github/workflows/lint-docs.yml"
      - ".github/workflows/docs-deploy.yml"

permissions:
  contents: read

concurrency:
  group: lint-docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  openapi:
    name: OpenAPI lint (Redocly)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
      - name: Lint OpenAPI YAML
        run: |
          npx -y @redocly/cli@2.30.3 lint docs/specs/api/openapi.yaml \
            --skip-rule no-server-example.com

  markdown-links:
    name: Markdown link check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >
            --no-progress
            --exclude-loopback
            --exclude '^https?://(localhost|127\.0\.0\.1|host\.docker\.internal|jvrmaia\.github\.io|github\.com/jvrmaia/chatlab/(blob|releases))'
            --exclude-path 'docs-site/i18n'
            --accept 200,403,429
            './**/*.md'
          fail: true

  mermaid:
    name: Mermaid render check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
      - name: Render every Mermaid block
        run: |
          set -euo pipefail
          # Ubuntu 23.10+ restricts unprivileged user namespaces via AppArmor;
          # Puppeteer (used by mermaid-cli) needs --no-sandbox to launch Chromium.
          echo '{"args":["--no-sandbox","--disable-setuid-sandbox"]}' > /tmp/puppeteer-config.json
          shopt -s globstar nullglob
          fail=0
          for f in docs/**/*.md README.md CONTRIBUTING.md CLAUDE.md; do
            [ -e "$f" ] || continue
            if grep -q '```mermaid' "$f"; then
              echo "→ rendering $f"
              if ! npx -y @mermaid-js/mermaid-cli@latest \
                   -i "$f" -o "/tmp/$(basename "$f").rendered.md" \
                   -p /tmp/puppeteer-config.json \
                   2>&1 | tee /tmp/mmdc.log; then
                fail=1
              fi
              if grep -qi 'syntax error\|parse error\|✗' /tmp/mmdc.log; then
                fail=1
              fi
            fi
          done
          exit "$fail"

  docusaurus-build:
    name: Docusaurus build (docs-site)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: npm
          cache-dependency-path: docs-site/package-lock.json
      - name: Install + build
        run: |
          npm ci --prefix docs-site
          npm run build --prefix docs-site
