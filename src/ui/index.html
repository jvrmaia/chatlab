<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ChatLab</title>
    <script>
      (function () {
        try {
          var d = document.documentElement;
          var t = localStorage.getItem("chatlab.theme");
          if (t !== "light" && t !== "dark") {
            t = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light";
          }
          d.setAttribute("data-theme", t);
          var den = localStorage.getItem("chatlab.density");
          if (den !== "compact" && den !== "cozy" && den !== "comfy") den = "cozy";
          d.setAttribute("data-density", den);
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "light");
          document.documentElement.setAttribute("data-density", "cozy");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/main.tsx"></script>
  </body>
</html>
